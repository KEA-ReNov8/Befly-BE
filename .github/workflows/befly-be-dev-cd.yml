name: BeFly-BE CD

on:
  pull_request:
    types: [closed]
    branches:
      - develop

jobs:
  deploy:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          submodules: true
          token: ${{ secrets.PAT }}

      - name: Init submodules
        run: |
          git config --global url."https://${{ secrets.PAT }}@github.com".insteadOf "https://github.com"
          git submodule update --init --recursive

      - name: Set up Java 17 & cache Gradle
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Determine & Build changed modules
        id: build
        run: |
          base=${{ github.event.pull_request.base.sha }}
          head=${{ github.event.pull_request.head.sha }}
          echo "Base: $base"
          echo "Head: $head"
          files=$(git diff --name-only $base $head)
          mods=$(echo "$files" \
            | grep -E '^(user|community|consult)/' \
            | cut -d/ -f1 \
            | sort -u \
            | tr '\n' ' ')
          echo "modules=$mods" >> $GITHUB_OUTPUT
          if [ -n "$mods" ]; then
            chmod +x ./gradlew
            for m in $mods; do
              ./gradlew :$m:bootJar -x test --no-daemon
            done
          fi
      

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & Push images
        if: ${{ steps.build.outputs.modules != '' }}
        run: |
          for m in ${{ steps.build.outputs.modules }}; do
            docker build \
              --file $m/Dockerfile \
              --build-arg JAR_FILE=build/libs/${m}-0.0.1-SNAPSHOT.jar \
              --tag ${{ secrets.DOCKER_USERNAME }}/befly-$m:dev \
              $m
            docker push ${{ secrets.DOCKER_USERNAME }}/befly-$m:dev
          done

      - name: Deploy to UserPost & Consult via Gateway
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_GATEWAY_HOST }}
          username: ${{ secrets.SSH_GATEWAY_USER }}
          key: ${{ secrets.SSH_GATEWAY_PRIVATE_KEY }}
          script: |
            chmod +x ~/deploy.sh
            
            # (A) UserPost VM: user, community 컨테이너만 변경 배포
            if [[ "${{ steps.build.outputs.modules }}" =~ user ]]; then
            ssh -i ~/.ssh/id_rsa_userpost ${{ secrets.SSH_GATEWAY_USER }}@${{ secrets.SSH_USERPOST_HOST }} \
            "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} \
                     DOCKER_PASSWORD='${{ secrets.DOCKER_PASSWORD }}' \
                     DB_URL='${{ secrets.DB_URL }}' \
                     DB_USERNAME='${{ secrets.DB_USERNAME }}' \
                     DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
                     ~/deploy.sh user"
            fi
            
            if [[ "${{ steps.build.outputs.modules }}" =~ community ]]; then
            ssh -i ~/.ssh/id_rsa_userpost ${{ secrets.SSH_GATEWAY_USER }}@${{ secrets.SSH_USERPOST_HOST }} \
            "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} \
                     DOCKER_PASSWORD='${{ secrets.DOCKER_PASSWORD }}' \
                     DB_URL='${{ secrets.DB_URL }}' \
                     DB_USERNAME='${{ secrets.DB_USERNAME }}' \
                     DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
                     ~/deploy.sh community"
            fi

            # (B) Consult VM: consult 컨테이너만 변경 배포
            if [[ "${{ steps.build.outputs.modules }}" =~ consult ]]; then
            ssh -i ~/.ssh/id_rsa_consult ${{ secrets.SSH_GATEWAY_USER }}@${{ secrets.SSH_CONSULT_HOST }} \
            "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} \
                     DOCKER_PASSWORD='${{ secrets.DOCKER_PASSWORD }}' \
                     DB_URL='${{ secrets.DB_URL }}' \
                     DB_USERNAME='${{ secrets.DB_USERNAME }}' \
                     DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
                     ~/deploy.sh consult"
            fi
