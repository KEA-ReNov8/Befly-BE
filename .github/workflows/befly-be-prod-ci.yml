name: "BeFly-BE Production CI"

on:
  pull_request:
    branches:
      - production

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository with submodules
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT }}
          submodules: recursive

      - name: Set up Git authentication for submodules
        run: |
          git config --global url."https://${{ secrets.PAT }}@github.com".insteadOf "https://github.com"
          git submodule update --init --recursive

      - name: Set up JDK 17 and enable Gradle caching
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Determine & Build changed modules
        id: build
        run: |
          base=${{ github.event.pull_request.base.sha }}
          head=${{ github.event.pull_request.head.sha }}
          echo "Base: $base"
          echo "Head: $head"
          files=$(git diff --name-only $base $head)
          mods=$(echo "$files" \
            | grep -E '^(user|community|consult)/' \
            | cut -d/ -f1 \
            | sort -u \
            | tr '\n' ' ')
          echo "modules=$mods" >> $GITHUB_OUTPUT
          if [ -n "$mods" ]; then
            chmod +x ./gradlew
            for m in $mods; do
              ./gradlew :$m:bootJar -x test --no-daemon
            done
          fi

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Get Git short SHA
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build & Push images
        if: ${{ steps.build.outputs.modules != '' }}
        run: |
          for m in ${{ steps.build.outputs.modules }}; do
            docker build \
              --file $m/Dockerfile.prod \
              --build-arg JAR_FILE=build/libs/${m}-0.0.1-SNAPSHOT.jar \
              --tag ${{ secrets.DOCKER_USERNAME }}/befly-$m:${{ steps.vars.outputs.sha }} \
              $m
            docker push ${{ secrets.DOCKER_USERNAME }}/befly-$m:${{ steps.vars.outputs.sha }}
          done
